openapi: '3.0.3'
info:
  title: mindtrack
  version: '1.0'
servers:
  - url: https://localhost/8081
    description: Mindtrack API
components:
  securitySchemes:
    name:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /test:
    get:
      responses:
        '200':
          description: OK
      security:
        - name: []
  /users:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: User created successfully